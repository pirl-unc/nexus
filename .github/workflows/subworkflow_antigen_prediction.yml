name: "Tests: Antigen Prediction Subworkflow"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run linter
        run: |
          pip install pylint
          chmod +x lint.sh
          bash lint.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: test-env
          python-version: "3.10"
          use-mamba: true
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          mamba install -y \
            pandas \
            nextflow=23.10.0 \
            pytest \
            pytest-cov \
            coveralls
          pip install . --verbose

      - name: Run unit tests
        shell: bash -l {0}
        run: |
          chmod +x scripts/unittests/subworkflow_antigen_prediction.sh
          bash scripts/unittests/subworkflow_antigen_prediction.sh
