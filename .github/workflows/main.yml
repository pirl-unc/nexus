name: build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: "latest"
        activate-environment: test-env
        python-version: "3.10"

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        sudo rm -rf /tmp/*
        conda env list
        conda info
        conda config --add channels defaults
        conda config --add channels bioconda
        conda config --add channels conda-forge
        conda config --set channel_priority strict
        conda create -n py27 python=2.7
        conda activate py27
        conda install lumpy-sv==0.3.1
        echo "HERE 1"
        conda deactivate
        echo "HERE 2"
        chmod +x /usr/share/miniconda3/envs/py27/bin/lumpyexpress
        echo "HERE 3"
        chmod +x /usr/share/miniconda3/envs/py27/bin/lumpyexpress.config
        echo "HERE 4"
        lumpyexpress_config_file=/usr/share/miniconda3/envs/py27/bin/lumpyexpress.config
        echo "HERE 5"
        new_python_path="/usr/share/miniconda3/envs/py27/bin/python2"
        echo "HERE 6"
        temp_file=$(mktemp)
        echo "HERE 7"
        sed "s|PYTHON=\`which python \|\| true\`|PYTHON=$new_python_path|" "$lumpyexpress_config_file" > "$temp_file"
        echo "HERE 8"
        mv "$temp_file" "$lumpyexpress_config_file"
        echo "HERE 9"
        echo '/home/runner/work/nexus/nexus/' >> $GITHUB_PATH
        echo "HERE 10"
        echo '/usr/share/miniconda3/envs/py27/bin/' >> $GITHUB_PATH
        echo "HERE 11"
        which lumpyexpress.config
        echo "HERE 12"
        which python2
        echo "HERE 13"