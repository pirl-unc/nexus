name: build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: "latest"
        activate-environment: test-env
        python-version: "3.10"

    - name: Set up Singularity
      uses: eWaterCycle/setup-singularity@v7
      with:
        singularity-version: 3.8.3

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda env list
        conda info
        conda config --add channels defaults
        conda config --add channels bioconda
        conda config --add channels conda-forge
        conda config --set channel_priority strict
        conda install pandas
        conda install nextflow==23.10.0
        conda install samtools==1.18
        conda install minimap2==2.22
        conda install sniffles==2.2
        conda install svim==2.0.0
        conda install pbsv==2.9.0
        conda install cutesv==2.1.0
        pip install ultra-bioinformatics
        conda install bwa-mem2==2.2.1
        conda install gatk4==4.4.0.0
        conda install picard==3.1.1
        conda install pylint
        conda install coveralls
        conda install pytest
        conda install pytest-cov
        wget https://github.com/mozack/abra2/releases/download/v2.23/abra2-2.23.jar
        chmod +x abra2-2.23.jar
        wget https://github.com/Illumina/strelka/releases/download/v2.9.10/strelka-2.9.10.centos6_x86_64.tar.bz2
        tar -xvf strelka-2.9.10.centos6_x86_64.tar.bz2
        pip install . --verbose
        conda create -n py27 python=2.7

    - name: Run linter
      shell: bash -l {0}
      run: |
        chmod +x lint.sh
        bash lint.sh

    - name: Run unit tests
      shell: bash -l {0}
      env:
        abra2: '/home/runner/work/nexus/nexus/abra2-2.23.jar'
        python2: '/usr/share/miniconda3/envs/py27/bin/python'
        strelka2: '/home/runner/work/nexus/nexus/strelka-2.9.10.centos6_x86_64/bin'
      run: |
        pytest -s test/test_paired_end_read_dna_somatic_small_variants.py -k test_paired_end_read_dna_somatic_small_variants_human_singularity