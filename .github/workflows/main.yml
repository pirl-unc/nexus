name: build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Delete artifacts
      uses: geekyeggo/delete-artifact@v2
      with:
          name: |
              artifact-*
              binary-file
              output