name: "CI"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run linter
        run: |
          pip install pylint
          chmod +x lint.sh
          bash lint.sh

  test-subworkflows:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        group:
          - alignment
          - antigen_prediction
          - assembly
          - haplotyping
          - hla_typing
          - isoform_characterization
          - peptide_prediction
          - quantification
          - read_error_correction
          - sequencing_simulation
          - utilities
          - variant_calling_dna-lr
          - variant_calling_dna-sr
          - variant_calling_rna-lr
          - variant_calling_rna-sr
          - variant_phasing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: test-env
          python-version: "3.10"
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y \
            pandas \
            nextflow=23.10.0 \
            pytest \
            pytest-cov \
            coveralls
          pip install . --verbose

      - name: Run unit tests
        shell: bash -l {0}
        run: |
          chmod +x scripts/unittests/subworkflow_${{ matrix.group }}.sh
          bash scripts/unittests/subworkflow_${{ matrix.group }}.sh

  test-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        group:
          - hla_typing
          - isoform_characterization
          - quantification
          - variant_calling
          - variant_calling_lr-germline
          - variant_calling_lr-somatic
          - variant_calling_sr-germline
          - variant_calling_sr-somatic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: test-env
          python-version: "3.10"
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y \
            pandas \
            nextflow=23.10.0 \
            pytest \
            pytest-cov \
            coveralls
          pip install . --verbose

      - name: Run unit tests
        shell: bash -l {0}
        run: |
          chmod +x scripts/unittests/workflow_${{ matrix.group }}.sh
          bash scripts/unittests/workflow_${{ matrix.group }}.sh
