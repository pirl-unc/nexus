# Test 3: SQANTI3 (FASTA and GTF modes)
samples_tsv_file: ""
output_dir: ""
reference_genome_fasta_file: ""
reference_genes_gtf_file: ""
methods: "sqanti3-fasta,sqanti3-gtf"

sqanti3_fasta:
  qc_extra_args: "--aligner_choice minimap2 --report skip --force_id_ignore"
  filter_extra_args: "ml --skip_report"

sqanti3_gtf:
  qc_extra_args: "--report skip"
  filter_extra_args: "ml --skip_report"
